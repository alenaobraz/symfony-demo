image: jakzal/phpqa:php8.4

services:
    - percona:ps-8.0.29-21
variables:
    MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    DATABASE_URL: 'mysql://root:@percona:3306/symfony_demo_test'

before_script:
    - cd webapp
    - composer install
    - docker-php-ext-install mysqli pdo pdo_mysql
    - php bin/console --env=test doctrine:database:create
    - php bin/console --env=test doctrine:schema:create

cache:
    paths:
    - vendor/

stages:
    - build
    - analyze
    - test

build:
    image: docker:20.10
    services:
        - docker:20.10-dind
    script:
        # Авторизация в GitLab Container Registry для хранения docker-образа
        - docker login -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN
        - docker build --no-cache -f ../docker/images/php-fpm/Dockerfile --tag $CONTAINER_IMAGE_PATH .
        - docker push $CONTAINER_IMAGE_PATH

phpstan:
    stage: analyze
    script:
        - phpstan analyse -c phpstan.dist.neon ./src
    allow_failure: false

phpunit:
    stage: test
    script:
        - php bin/phpunit --configuration phpunit.dist.xml
    allow_failure: false
